name: 自動抓取期交所微台資料

on:
  schedule:
    # 這是 UTC 時間。台灣時間 16:30 = UTC 時間 08:30
    # 設定為每週一到週五的 UTC 08:30 執行
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊執行測試

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須開啟寫入權限，才能把資料庫存回 GitHub

    steps:
    - name: 📥 結帳取得您的程式碼
      uses: actions/checkout@v3

    - name: 🐍 設定 Python 環境 (3.11)
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 安裝必備套件
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: 🚀 執行資料庫自動更新腳本
      run: python auto_update.py

    - name: 💾 將新資料庫儲存並推回 GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add mtx_data.db
        # 如果資料庫有變更，就提交並推送；如果沒有變更（例如遇到假日），就略過不報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新微台指 1分K 資料庫" && git push)
